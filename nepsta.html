<!DOCTYPE html>
<html>
<head>
  <title>Nepsta Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url('https://upload.wikimedia.org/wikipedia/commons/9/9b/Flag_of_Nepal.svg') no-repeat center center;
      background-size: cover;
    }

    .box {
      background: rgba(255, 255, 255, 0.95);
      padding: 25px;
      border-radius: 15px;
      width: 320px;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
      text-align: center;
    }

    h2 {
      color: #d91e2f; /* Nepal flag red */
    }

    input, button {
      width: 100%;
      margin-top: 12px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      background: #003893; /* Nepal flag blue */
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.9;
    }

    #app {
      display: none;
      background: rgba(255,255,255,0.95);
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
      width: 320px;
    }

    #app h2 {
      color: #d91e2f;
    }

    #logoutBtn {
      margin-top: 15px;
      background: #003893;
    }
  </style>
</head>
<body>

<div id="auth" class="box">
  <h2>📸 Nepsta Login</h2>
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<div id="app">
  <h2>Welcome to Nepsta 🎉</h2>
  <p>You are logged in as <span id="currentUser"></span></p>
  <button id="logoutBtn" onclick="logout()">Logout</button>
</div>

<script>
  function signup() {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    if (!user || !pass) {
      alert("Enter username and password");
      return;
    }

    localStorage.setItem("user", user);
    localStorage.setItem("pass", pass);

    alert("Account created!");
  }

  function login() {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    const savedUser = localStorage.getItem("user");
    const savedPass = localStorage.getItem("pass");

    if (user === savedUser && pass === savedPass) {
      document.getElementById("auth").style.display = "none";
      document.getElementById("app").style.display = "block";
      document.getElementById("currentUser").innerText = user;
    } else {
      alert("Wrong ID or Password");
    }
  }

  function logout() {
    document.getElementById("auth").style.display = "block";
    document.getElementById("app").style.display = "none";
  }
</script>

</body>
</html>
